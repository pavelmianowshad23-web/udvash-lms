<!DOCTYPE html>
<html>
<head>
<title>Login - Udvash Platform</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:white;
padding:40px;
width:300px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
}

button{
background:#0b5ed7;
color:white;
border:none;
padding:10px;
width:100%;
cursor:pointer;
}

</style>
</head>

<body>

<div class="login-box">

<h2>Student Login</h2>

<input type="text" placeholder="Email or ID">
<input type="password" placeholder="Password">

<button>Login</button>

<br><br>

<a href="index.html">Back to Home</a>

</div>

</body>
</html>
